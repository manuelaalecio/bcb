# Sobe tudo com:  docker compose up --build
# (versão "version:" não é mais necessária no Compose moderno)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bcb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bcb}
      POSTGRES_DB: ${POSTGRES_DB:-bcb}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bcb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bcb}:${POSTGRES_PASSWORD:-bcb}@db:5432/${POSTGRES_DB:-bcb}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: "3000"
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
